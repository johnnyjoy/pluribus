# Optional: build Postgres + pg_textsearch image (does not gate main CI).
name: pg-textsearch image

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feature/pg-textsearch*"
    paths:
      - "docker/pg-textsearch/**"
      - ".github/workflows/pg-textsearch.yml"

permissions:
  contents: read

jobs:
  build-pg-textsearch-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build pg-textsearch Postgres image
        run: |
          docker build -t pluribus-postgres-pg-textsearch:ci \
            -f docker/pg-textsearch/Dockerfile docker/pg-textsearch
